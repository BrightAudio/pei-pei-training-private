<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pei Pei Training</title>
<style>
:root{color-scheme:dark;--red:#D4232A;--gold:#F5A623;--bg:#0A0A14;--card:#16162A;--border:#2A2A48;--text:#F0F0FF;--muted:#A0A0C0}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top,var(--red),var(--bg) 44%);color:var(--text);display:grid;place-items:center;padding:20px}
.card{width:min(420px,100%);background:rgba(22,22,42,.94);border:1px solid var(--border);border-radius:18px;padding:24px;box-shadow:0 24px 80px rgba(0,0,0,.45)}
.logo{width:76px;height:76px;border-radius:50%;background:var(--red);display:grid;place-items:center;border:3px solid white;font-weight:900;margin-bottom:18px}
h1{font-size:28px;line-height:1.05;margin:0 0 8px}
p{color:var(--muted);font-size:14px;line-height:1.5;margin:0 0 18px}
label{display:block;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:7px}
input{width:100%;border:1.5px solid var(--border);background:#0D0D1A;color:var(--text);border-radius:10px;padding:13px 14px;font-size:16px;outline:none}
input:focus{border-color:var(--gold)}
button{width:100%;margin-top:12px;border:none;border-radius:10px;background:var(--red);color:white;padding:13px 14px;font-weight:900;font-size:15px;cursor:pointer}
.status{min-height:20px;margin-top:12px;color:var(--gold);font-size:13px;font-weight:700}
.fine{margin-top:16px;font-size:11px;color:#77799a}
</style>
</head>
<body>
<main class="card">
 <div class="logo">PE</div>
 <h1>Pei Pei Training</h1>
 <p>This private build is encrypted. Enter the publishing password to load the app on this device.</p>
 <form id="unlock-form">
  <label for="pw">Password</label>
  <input id="pw" type="password" autocomplete="current-password" autofocus>
  <button type="submit">Unlock Training</button>
 </form>
 <div class="status" id="status"></div>
 <div class="fine">The app is decrypted in your browser. Keep the password limited to intended users.</div>
</main>

const te = new TextEncoder();
function b64Bytes(value){return Uint8Array.from(atob(value), c => c.charCodeAt(0));}
async function deriveKey(password){
 const material = await crypto.subtle.importKey('raw', te.encode(password), 'PBKDF2', false, ['deriveKey']);
 return crypto.subtle.deriveKey(
  {name:'PBKDF2', salt:b64Bytes(PAYLOAD.salt), iterations:PAYLOAD.iterations, hash:'SHA-256'},
  material,
  {name:'AES-GCM', length:256},
  false,
  ['decrypt']
 );
}
async function unlock(password){
 const key = await deriveKey(password);
 const data = b64Bytes(PAYLOAD.data);
 const tag = b64Bytes(PAYLOAD.tag);
 const combined = new Uint8Array(data.length + tag.length);
 combined.set(data);
 combined.set(tag, data.length);
 const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64Bytes(PAYLOAD.iv), tagLength:128}, key, combined);
 return new TextDecoder().decode(plain);
}
document.getElementById('unlock-form').addEventListener('submit', async event => {
 event.preventDefault();
 const status = document.getElementById('status');
 status.textContent = 'Unlocking...';
 try {
  const app = await unlock(document.getElementById('pw').value);
  document.open();
  document.write(app);
  document.close();
 } catch (error) {
  status.textContent = 'Wrong password or unsupported browser.';
 }
});
